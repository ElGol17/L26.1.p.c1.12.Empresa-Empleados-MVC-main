<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Empleados y empresas - Bootstrap</title>
</head>
<body>
    <div id="app-bootstrap" class="container mt-5">
        <h2>Gestión de Empleados de la Empresa (Bootstrap)</h2>
        <button type="button" class="btn btn-primary" id="body_btNuevoEmpleado">Nuevo Empleado</button>
        <hr>
        <div class="alert alert-info">
            Cantidad de hombres que trabajan en la empresa: <span id="body_lblTotalHombres" class="fw-bold">0</span>
        </div>
        <div class="alert alert-info">
            Porcentaje de mujeres que trabajan en la empresa: <span id="body_lblPorcentajeMujeres" class="fw-bold">0</span>%
        </div>
        <div class="alert alert-info">
            Cantidad de empleados que trabajan en la empresa: <span id="body_lblTotalTodos" class="fw-bold">0</span>
        </div>
  </div>

    <div class="modal fade" id="empleado" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Procesar Empleado</h5>
                </div>
                <div class="modal-body">
                    <label class="form-label">Nombre:</label>
                    <input type="text" class="form-control" id="empleado_inNombre">
                </div>
                <div class="modal-body">
                    <label class="form-label">Sexo:</label>
                    <select class="form-control" name="empleado_inSexo" id="empleado_inSexo">
                        <option value="F" selected>Femenino</option>
                        <option value="M">Masculino</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="empleado_btCancelar">Cancelar</button>
                    <button type="button" class="btn btn-success" id="empleado_btAceptar">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script type="module">
        import Cl_cEmpresa from "./dist/controllers/Cl_cEmpresa.js";
        import Cl_cEmpleado from "./dist/controllers/Cl_cEmpleado.js";

        import Cl_vEmpresa from "./dist/views/Cl_vEmpresa.js";
        import Cl_vEmpleado from "./dist/views/Cl_vEmpleado.js";

        const vistaEmpresa = new Cl_vEmpresa();
        console.log(vistaEmpresa);
        
        const vistaEmpleado = new Cl_vEmpleado();
        console.log(vistaEmpleado);
        
        const controladorEmpleado = new Cl_cEmpleado(vistaEmpleado);
        new Cl_cEmpresa(vistaEmpresa, controladorEmpleado);
    </script>
</body>
</html>
